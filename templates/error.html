<!DOCTYPE html>
<html lang="pt-BR">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Erro - GUIA</title>
    <link rel="stylesheet" href="/static/styles/main.css">
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.4.0/css/all.min.css">
    <style>
        .error-page {
            min-height: 100vh;
            display: flex;
            align-items: center;
            justify-content: center;
            background: #f8f7f4; /* Fundo da marca */
            padding: 20px;
        }
        
        .error-card {
            background: white;
            border-radius: 20px;
            padding: 50px;
            text-align: center;
            max-width: 500px;
            box-shadow: 0 10px 30px rgba(46, 67, 101, 0.1); /* Sombra suave com o Azul Escuro */
        }
        
        .error-icon {
            font-size: 5rem;
            color: #fc9003; /* Laranja da marca */
            margin-bottom: 20px;
        }
        
        .error-card h1 {
            font-size: 2.5rem;
            margin-bottom: 15px;
            color: #2e4365; /* Azul Escuro da marca */
        }
        
        .error-card p {
            color: #4a5568; /* Cinza escuro para boa leitura */
            margin-bottom: 30px;
            font-size: 1.1rem;
        }
        
        .btn-home {
            display: inline-block;
            padding: 12px 30px;
            background: #fc9003; /* Laranja da marca */
            color: white;
            text-decoration: none;
            border-radius: 8px;
            font-weight: 600;
            transition: all 0.3s ease;
        }
        
        .btn-home:hover {
            background: #e68200; /* Laranja mais escuro no hover */
            transform: translateY(-2px);
            box-shadow: 0 5px 15px rgba(252, 144, 3, 0.3); /* Sombra Laranja */
        }
    </style>
</head>
<body>
    <div class="error-page">
        <div class="error-card">
            <div class="error-icon">
                <i class="fas fa-exclamation-triangle"></i>
            </div>
            <h1>Ops!</h1>
            <p>{{ mensagem }}</p>
            <a href="/" class="btn-home">
                <i class="fas fa-home"></i> Voltar ao Início
            </a>
        </div>
    </div>
</body>
</html>
