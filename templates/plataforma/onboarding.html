<!DOCTYPE html>
<html lang="pt-BR">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Meu Guia de Bolso</title>
    <link rel="stylesheet" href="{{ url_for('static', filename='styles/main.css') }}">
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.4.0/css/all.min.css">
    <link rel="icon" type="image/x-icon" href="{{ url_for('static', filename='assets/favicon.ico') }}">
    
    <style>
        body { 
            background: #f8f7f4; /* Fundo oficial da marca */
            font-family: -apple-system, BlinkMacSystemFont, 'Segoe UI', Roboto, sans-serif; 
            margin: 0;
            padding: 0;
            padding-bottom: 40px;
        }
        
        .mobile-header { 
            background: #fc9003; /* Laranja da marca */
            color: white; 
            padding: 25px 20px; 
            display: flex; 
            justify-content: space-between; 
            align-items: center; 
            border-bottom-left-radius: 25px; 
            border-bottom-right-radius: 25px; 
            box-shadow: 0 4px 15px rgba(252, 144, 3, 0.2); /* Sombra Laranja */
            position: sticky;
            top: 0;
            z-index: 100;
        }
        
        .mobile-header h1 { font-size: 1.3rem; margin: 0; font-weight: 700; display: flex; align-items: center; gap: 8px; }
        
        .logout-btn { 
            color: white; 
            text-decoration: none; 
            font-size: 1.2rem; 
            background: rgba(255,255,255,0.2);
            width: 40px;
            height: 40px;
            display: flex;
            align-items: center;
            justify-content: center;
            border-radius: 50%;
            transition: background 0.2s;
        }
        .logout-btn:hover { background: rgba(255,255,255,0.3); }
        
        .welcome-section { padding: 30px 20px 15px; }
        .welcome-section h2 { font-size: 1.6rem; color: #2e4365; margin-bottom: 8px; font-weight: 700; } /* Título em Azul Escuro */
        .welcome-section p { color: #666; font-size: 1rem; line-height: 1.5; margin: 0; }
        
        /* Tag de Em andamento usando o Laranja e Creme */
        .status-badge { display: inline-block; background: rgba(252, 144, 3, 0.1); color: #fc9003; font-size: 0.8rem; padding: 4px 10px; border-radius: 12px; font-weight: 600; margin-top: 10px; }
        
        .tasks-wrapper { padding: 0 20px; }
        
        .task-card { 
            background: white; 
            border-radius: 16px; 
            padding: 20px; 
            margin-bottom: 15px; 
            box-shadow: 0 4px 10px rgba(46, 67, 101, 0.05); /* Sombra suave com Azul Escuro */
            display: flex; 
            align-items: flex-start; 
            gap: 15px; 
            transition: all 0.3s ease; 
            border: 1px solid #EAEAEA;
            position: relative;
        }
        
        .task-card.completed { 
            opacity: 0.6; 
            background: #FAFAFA;
            transform: scale(0.98);
        }
        
        .task-card.completed .task-text h3 { text-decoration: line-through; color: #999; }
        
        .checkbox-wrapper { padding-top: 2px; }
        
        /* Checkbox reestilizado para Azul Escuro para passar elegância e confiança */
        .custom-checkbox { 
            width: 26px; 
            height: 26px; 
            border: 2px solid #2e4365; 
            border-radius: 8px; 
            display: flex; 
            align-items: center; 
            justify-content: center; 
            cursor: pointer; 
            transition: all 0.2s cubic-bezier(0.4, 0, 0.2, 1); 
            background: white;
        }
        
        .custom-checkbox:active { transform: scale(0.9); }
        .custom-checkbox.checked { background: #2e4365; border-color: #2e4365; }
        .custom-checkbox i { color: white; font-size: 14px; opacity: 0; transform: scale(0.5); transition: all 0.2s; }
        .custom-checkbox.checked i { opacity: 1; transform: scale(1); }
        
        .task-text { flex: 1; }
        .task-text h3 { margin: 0 0 6px 0; font-size: 1.05rem; color: #333; line-height: 1.3; font-weight: 600; }
        .task-text p { margin: 0 0 8px 0; font-size: 0.9rem; color: #777; line-height: 1.5; }
        
        /* Tag visual de Dica puxando um pouco pro Creme */
        .task-hint { font-size: 0.75rem; color: #999; display: flex; align-items: center; gap: 5px; background: #FAFAFA; padding: 4px 8px; border-radius: 6px; width: fit-content; border: 1px solid rgba(251, 222, 149, 0.3); }
        
        .empty-state { text-align: center; padding: 50px 20px; background: white; border-radius: 20px; box-shadow: 0 4px 10px rgba(46, 67, 101, 0.05); }
        .empty-state i { font-size: 4rem; margin-bottom: 20px; color: #2e4365; } /* Ícone em Azul Escuro */
        .empty-state h3 { color: #333; margin-bottom: 10px; font-size: 1.3rem; }
        .empty-state p { color: #666; line-height: 1.5; font-size: 0.95rem; }
    </style>
</head>
<body>
    <header class="mobile-header">
        <div class="logo">
            <img src="{{ url_for('static', filename='images/image_branco.png') }}" alt="Logo do GUIA" class="logo-image" height="60">
        </div>
        <a href="{{ url_for('logout') }}" class="logout-btn" title="Sair"><i class="fas fa-power-off"></i></a>
    </header>

    <section class="welcome-section">
        <h2>Olá, {{ nome_colaborador.split(' ')[0] }}! 👋</h2>
        <p>Acompanhe aqui o checklist do seu onboarding. Veja o que está pendente no seu processo de integração.</p>
        <div class="status-badge"><i class="fas fa-spinner fa-spin"></i> Em andamento</div>
    </section>

    <!-- Lista de tarefas injetada pelo JavaScript -->
    <div class="tasks-wrapper" id="tasksContainer">
        <div style="text-align: center; color: #999; padding: 40px;">
            <i class="fas fa-spinner fa-spin" style="font-size: 2.5rem; margin-bottom: 15px; color: #fc9003;"></i>
            <p>Buscando status do seu processo...</p>
        </div>
    </div>

    <!-- Script leve modificado diretamente aqui para facilitar -->
    <script>
        document.addEventListener('DOMContentLoaded', () => {
            carregarTarefas();
        });

        async function carregarTarefas() {
            const container = document.getElementById('tasksContainer');
            
            try {
                const response = await fetch('/api/minhas_tarefas');
                if (!response.ok) throw new Error('Falha ao conectar com o servidor.');
                
                const tarefas = await response.json();
                
                if (tarefas.length === 0) {
                    container.innerHTML = `
                        <div class="empty-state">
                            <i class="fas fa-check-circle" style="color: #2e4365;"></i>
                            <h3>Tudo Certo por Aqui!</h3>
                            <p>Não há etapas pendentes para você nesta fase atual do processo. Aguarde o avanço para a próxima etapa.</p>
                        </div>
                    `;
                    return;
                }

                container.innerHTML = ''; 
                
                tarefas.forEach(tarefa => {
                    const isConcluida = tarefa.status === 'concluida';
                    
                    const card = document.createElement('div');
                    card.className = `task-card ${isConcluida ? 'completed' : ''}`;
                    card.id = `card-${tarefa.id}`;
                    
                    card.innerHTML = `
                        <div class="checkbox-wrapper">
                            <div class="custom-checkbox ${isConcluida ? 'checked' : ''}" 
                                 onclick="toggleTarefa(${tarefa.id}, this, document.getElementById('card-${tarefa.id}'))"
                                 id="checkbox-${tarefa.id}">
                                <i class="fas fa-check"></i>
                            </div>
                        </div>
                        <div class="task-text">
                            <h3>${tarefa.titulo}</h3>
                            ${tarefa.descricao ? `<p>${tarefa.descricao}</p>` : ''}
                            <div class="task-hint">
                                <i class="fas fa-info-circle"></i> O setor ou você podem marcar o check.
                            </div>
                        </div>
                    `;
                    container.appendChild(card);
                });
                
            } catch (error) {
                container.innerHTML = `
                    <div style="text-align: center; color: #fc9003; padding: 30px; background: white; border-radius: 16px;">
                        <i class="fas fa-exclamation-triangle" style="font-size: 3rem; margin-bottom: 15px;"></i>
                        <h3 style="color: #2e4365;">Ops! Algo deu errado.</h3>
                        <p style="color: #666;">Não conseguimos carregar o checklist. Verifique sua internet.</p>
                        <button onclick="location.reload()" style="margin-top: 15px; padding: 10px 20px; background: #fc9003; color: white; border: none; border-radius: 8px; cursor: pointer; font-weight: bold;">Tentar Novamente</button>
                    </div>
                `;
            }
        }

        async function toggleTarefa(taskId, checkboxElement, cardElement) {
            const isCurrentlyChecked = checkboxElement.classList.contains('checked');
            const newStatus = isCurrentlyChecked ? 'pendente' : 'concluida';
            
            checkboxElement.style.pointerEvents = 'none';
            checkboxElement.classList.toggle('checked');
            cardElement.classList.toggle('completed');

            try {
                const response = await fetch(`/api/atualizar_tarefa/${taskId}`, {
                    method: 'POST',
                    headers: { 'Content-Type': 'application/json' },
                    body: JSON.stringify({ status: newStatus })
                });

                if (!response.ok) throw new Error('Falha ao salvar');
                
            } catch (error) {
                checkboxElement.classList.toggle('checked');
                cardElement.classList.toggle('completed');
                alert('Erro ao atualizar. Verifique sua conexão.');
            } finally {
                checkboxElement.style.pointerEvents = 'auto';
            }
        }
    </script>
</body>
</html>
