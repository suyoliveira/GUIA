<!DOCTYPE html>
<html lang="pt-BR">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Login - GUIA</title>
    <link rel="stylesheet" href="/static/styles/main.css">
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.4.0/css/all.min.css">
    <style>
        .login-container {
            min-height: 100vh;
            display: flex;
            align-items: center;
            justify-content: center;
            background: linear-gradient(135deg, #FF3B30, #FF9500);
            padding: 20px;
        }
        
        .login-card {
            background: white;
            border-radius: 20px;
            padding: 40px;
            width: 100%;
            max-width: 400px;
            box-shadow: 0 20px 40px rgba(0,0,0,0.2);
        }
        
        .login-header {
            text-align: center;
            margin-bottom: 30px;
        }
        
        .login-header .logo {
            font-size: 2rem;
            color: #FF3B30;
            margin-bottom: 10px;
        }
        
        .login-header h1 {
            font-size: 1.8rem;
            margin-bottom: 5px;
        }
        
        .login-header p {
            color: #666;
        }
        
        .form-group {
            margin-bottom: 20px;
        }
        
        .form-group label {
            display: block;
            margin-bottom: 8px;
            font-weight: 600;
            color: #333;
        }
        
        .form-control {
            width: 100%;
            padding: 12px 15px;
            border: 2px solid #E9ECEF;
            border-radius: 8px;
            font-size: 1rem;
            transition: all 0.3s ease;
        }
        
        .form-control:focus {
            outline: none;
            border-color: #FF3B30;
            box-shadow: 0 0 0 3px rgba(255, 59, 48, 0.1);
        }
        
        .btn-login {
            width: 100%;
            padding: 14px;
            background: #FF3B30;
            color: white;
            border: none;
            border-radius: 8px;
            font-size: 1rem;
            font-weight: 600;
            cursor: pointer;
            transition: all 0.3s ease;
        }
        
        .btn-login:hover {
            background: #E5352B;
            transform: translateY(-2px);
            box-shadow: 0 5px 15px rgba(255, 59, 48, 0.3);
        }
        
        .info-box {
            margin-top: 30px;
            padding: 15px;
            background: #F8F9FA;
            border-radius: 8px;
            font-size: 0.9rem;
        }
        
        .info-box p {
            margin: 5px 0;
            color: #666;
        }
        
        .info-box i {
            color: #FF3B30;
            margin-right: 5px;
        }
    </style>
</head>
<body>
    <div class="login-container">
        <div class="login-card">
            <div class="login-header">
                <div class="logo">
                    <i class="fas fa-rocket"></i>
                </div>
                <h1>GUIA</h1>
                <p>Gestão Unificada de Integração</p>
            </div>
            
            <form onsubmit="return fazerLogin(event)">
                <div class="form-group">
                    <label for="accessToken">Token de Acesso</label>
                    <input type="text" id="accessToken" class="form-control" 
                           placeholder="Cole seu token aqui" required>
                </div>
                
                <button type="submit" class="btn-login">
                    <i class="fas fa-sign-in-alt"></i> Acessar Plataforma
                </button>
            </form>
            
            <div class="info-box">
                <p><i class="fas fa-info-circle"></i> <strong>Colaboradores:</strong> Use o token fornecido pelo RH</p>
                <p><i class="fas fa-info-circle"></i> <strong>Gestores:</strong> Use seu email corporativo</p>
                <p style="margin-top: 10px; font-size: 0.8rem;">
                    <i class="fas fa-lock"></i> Ambiente seguro e criptografado
                </p>
            </div>
        </div>
    </div>
    
    <script>
        function fazerLogin(event) {
            event.preventDefault();
            
            const token = document.getElementById('accessToken').value;
            
            if (token) {
                // Redirecionar para onboarding com token
                window.location.href = `/plataforma/onboarding?token=${token}`;
            }
            
            return false;
        }
    </script>
</body>
</html>
