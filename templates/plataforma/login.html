<!DOCTYPE html>
<html lang="pt-BR">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Login Área de Gestão - GUIA</title>
    <link rel="stylesheet" href="/static/styles/main.css">
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.4.0/css/all.min.css">
    <style>
        .login-container { min-height: 100vh; display: flex; align-items: center; justify-content: center; background: linear-gradient(135deg, #FF3B30, #FF9500); padding: 20px; }
        .login-card { background: white; border-radius: 20px; padding: 40px; width: 100%; max-width: 400px; box-shadow: 0 20px 40px rgba(0,0,0,0.2); }
        .login-header { text-align: center; margin-bottom: 30px; }
        .login-header .logo { font-size: 2rem; color: #FF3B30; margin-bottom: 10px; }
        .form-group { margin-bottom: 20px; }
        .form-group label { display: block; margin-bottom: 8px; font-weight: 600; color: #333; }
        .form-control { width: 100%; padding: 12px 15px; border: 2px solid #E9ECEF; border-radius: 8px; font-size: 1rem; transition: all 0.3s ease; }
        .form-control:focus { outline: none; border-color: #FF3B30; box-shadow: 0 0 0 3px rgba(255, 59, 48, 0.1); }
        .btn-login { width: 100%; padding: 14px; background: #FF3B30; color: white; border: none; border-radius: 8px; font-size: 1rem; font-weight: 600; cursor: pointer; transition: all 0.3s ease; }
        .btn-login:hover { background: #E5352B; transform: translateY(-2px); box-shadow: 0 5px 15px rgba(255, 59, 48, 0.3); }
        .switch-login { margin-top: 25px; text-align: center; padding-top: 20px; border-top: 1px solid #E9ECEF; }
        .switch-login a { color: #007AFF; text-decoration: none; font-weight: 600; }
        .error-msg { color: #FF3B30; font-size: 0.9rem; margin-bottom: 15px; text-align: center; display: none; }
    </style>
</head>
<body>
    <div class="login-container">
        <div class="login-card">
            <div class="login-header">
                <div class="logo"><i class="fas fa-user-tie"></i></div>
                <h1>Área de Gestão</h1>
                <p>Acesso para RH e Líderes</p>
            </div>
            
            <div id="errorMsg" class="error-msg">Email ou senha incorretos.</div>

            <form onsubmit="return fazerLoginGestor(event)">
                <div class="form-group">
                    <label for="email">E-mail Corporativo</label>
                    <input type="email" id="email" class="form-control" placeholder="nome@empresa.com" required>
                </div>
                <div class="form-group">
                    <label for="senha">Senha</label>
                    <input type="password" id="senha" class="form-control" placeholder="••••••••" required>
                </div>
                
                <button type="submit" class="btn-login" id="btnSubmit">
                    <i class="fas fa-sign-in-alt"></i> Entrar
                </button>
            </form>
            
            <div class="switch-login">
                <p style="color: #666; margin-bottom: 5px; font-size: 0.9rem;">É um novo colaborador na empresa?</p>
                <a href="/login/colaborador"><i class="fas fa-rocket"></i> Acessar Meu Onboarding</a>
            </div>
        </div>
    </div>
    
    <script>
        async function fazerLoginGestor(event) {
            event.preventDefault();
            const btn = document.getElementById('btnSubmit');
            const errorMsg = document.getElementById('errorMsg');
            
            const email = document.getElementById('email').value;
            const senha = document.getElementById('senha').value;
            
            btn.innerHTML = '<i class="fas fa-spinner fa-spin"></i> Entrando...';
            btn.disabled = true;
            errorMsg.style.display = 'none';

            try {
                const response = await fetch('/api/login', {
                    method: 'POST',
                    headers: { 'Content-Type': 'application/json' },
                    body: JSON.stringify({ email, senha })
                });
                
                const result = await response.json();
                
                if (result.success) {
                    window.location.href = result.redirect;
                } else {
                    errorMsg.textContent = result.error;
                    errorMsg.style.display = 'block';
                    btn.innerHTML = '<i class="fas fa-sign-in-alt"></i> Entrar';
                    btn.disabled = false;
                }
            } catch (e) {
                errorMsg.textContent = "Erro de conexão com o servidor.";
                errorMsg.style.display = 'block';
                btn.innerHTML = '<i class="fas fa-sign-in-alt"></i> Entrar';
                btn.disabled = false;
            }
            return false;
        }
    </script>
</body>
</html>
