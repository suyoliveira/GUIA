<!DOCTYPE html>
<html lang="pt-br">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Login - GUIA</title>
    <link rel="stylesheet" href="{{ url_for('static', filename='styles/main.css') }}">
    <link rel="stylesheet" href="{{ url_for('static', filename='styles/auth.css') }}">
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.4.0/css/all.min.css">
    <link rel="icon" type="image/x-icon" href="{{ url_for('static', filename='assets/favicon.ico') }}">
    
    <style>
        /* Estilo para as mensagens de erro do Flask combinarem com o seu layout */
        .alert {
            padding: 12px;
            border-radius: 8px;
            margin-bottom: 20px;
            text-align: center;
            font-size: 0.9rem;
            font-weight: 500;
        }
        .alert-danger {
            background: rgba(252, 144, 3, 0.1); /* Fundo Laranja Suave */
            color: #fc9003; /* Laranja da marca */
            border: 1px solid rgba(252, 144, 3, 0.3); /* Borda Laranja translúcida */
        }
    </style>
</head>
<body>
    <header class="main-header">
        <div class="container">
            <div class="header-content">
                <div class="logo">
                    <img src="{{ url_for('static', filename='images/image.png') }}" alt="Logo do GUIA" class="logo-image" height="60">
                </div>
            </div>
        </div>
    </header>

    <div class="auth-container">
        <div class="auth-box">
            <div class="auth-header">
                <h1>Bem-vindo de volta!</h1>
                <center><p>Faça login para acessar sua conta</p></center>
            </div>
            
            <!-- Motor de mensagens nativo do Flask (Captura erros do backend e exibe em laranja) -->
            {% with messages = get_flashed_messages(with_categories=true) %}
              {% if messages %}
                {% for category, message in messages %}
                  <div class="alert alert-{{ category }}">
                    <i class="fas fa-exclamation-circle"></i> {{ message }}
                  </div>
                {% endfor %}
              {% endif %}
            {% endwith %}

            <!-- Formulário apontando diretamente para o Python (method="POST") -->
            <form action="{{ url_for('login') }}" method="POST" class="auth-form">
                <div class="form-group">
                    <label for="email">
                        <i class="fas fa-envelope"></i>
                        E-mail
                    </label>
                    <input type="email" id="email" name="email" placeholder="Digite seu e-mail" required>
                </div>

                <div class="form-group">
                    <div class="password-header">
                        <label for="senha">
                            <i class="fas fa-lock"></i>
                            Senha
                        </label>
                    </div>
                    <input type="password" id="senha" name="senha" placeholder="Digite sua senha" required>
                </div>

                <button type="submit" class="btn-auth">
                    <i class="fas fa-sign-in-alt"></i>
                    Entrar
                </button>
            </form>
        </div>
    </div>
</body>
</html>
