<!DOCTYPE html>
<html lang="pt-BR">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Dashboard Gestão - GUIA</title>
    
    <link rel="stylesheet" href="/static/styles/main.css">
    <link rel="stylesheet" href="/static/styles/dashboard.css">
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.4.0/css/all.min.css">
    <link rel="icon" type="image/x-icon" href="/static/assets/favicon.ico">
</head>
<body class="dashboard-body">
    <header class="dashboard-header">
        <div class="container">
            <div class="dashboard-header-content">
                <div class="dashboard-logo">
                    <a href="/">
                        <i class="fas fa-rocket rocket-icon"></i>
                        <span class="logo-text">GUIA</span>
                    </a>
                </div>
                
                <div class="dashboard-search">
                    <i class="fas fa-search"></i>
                    <input type="text" placeholder="Buscar colaborador ou pendência..." id="searchInput">
                </div>
                
                <div class="dashboard-user">
                    <div class="notifications" id="notificationsBtn">
                        <i class="fas fa-bell"></i>
                        <span class="notification-badge">0</span>
                    </div>
                    <div class="user-info" id="userMenu">
                        <div class="user-avatar" style="background: var(--primary-red);">RH</div>
                        <div class="user-details">
                            <span class="user-name">Setor Pessoal</span>
                            <span class="user-role">Administrador</span>
                        </div>
                        <i class="fas fa-chevron-down"></i>
                    </div>
                </div>
            </div>
        </div>
    </header>

    <div class="dashboard-container">
        <div class="dashboard-content">
            <aside class="dashboard-sidebar">
                <div class="sidebar-section">
                    <h3>Visão Gestão</h3>
                    <ul class="sidebar-menu">
                        <li><a href="/dashboard" class="active">
                            <i class="fas fa-columns"></i> Fluxo de Admissões
                        </a></li>
                        <li><a href="#" onclick="gerarTokenParaColaborador()">
                            <i class="fas fa-user-plus"></i> Novo Colaborador
                        </a></li>
                    </ul>
                </div>
                
                <div class="sidebar-section">
                    <h3>Setores Envolvidos</h3>
                    <ul class="department-list" id="departmentList">
                        <li>
                            <a href="#" class="department-filter active" data-department="todos">
                                Todos os Setores <span class="department-count" id="totalCards">0</span>
                            </a>
                        </li>
                    </ul>
                </div>
            </aside>

            <main class="dashboard-main">
                <div class="quick-stats" id="quickStats">
                    <div class="stat-card">
                        <div class="stat-icon" style="background-color: rgba(0, 122, 255, 0.1);">
                            <i class="fas fa-users" style="color: #007AFF;"></i>
                        </div>
                        <div class="stat-content">
                            <h3 class="stat-number" id="totalColaboradores">0</h3>
                            <p>Em Processo</p>
                        </div>
                    </div>
                    <div class="stat-card">
                        <div class="stat-icon" style="background-color: rgba(255, 59, 48, 0.1);">
                            <i class="fas fa-exclamation-triangle" style="color: #FF3B30;"></i>
                        </div>
                        <div class="stat-content">
                            <h3 class="stat-number" id="tarefasPendentes">0</h3>
                            <p>Pendências</p>
                        </div>
                    </div>
                    <div class="stat-card">
                        <div class="stat-icon" style="background-color: rgba(52, 199, 89, 0.1);">
                            <i class="fas fa-check-circle" style="color: #34C759;"></i>
                        </div>
                        <div class="stat-content">
                            <h3 class="stat-number" id="progressoGeral">0%</h3>
                            <p>Progresso Geral</p>
                        </div>
                    </div>
                </div>

                <div class="kanban-board-container">
                    <div class="kanban-header">
                        <div>
                            <h2>
                                <i class="fas fa-stream"></i> Quadro de Onboarding
                                <span class="department-indicator" id="currentDepartment">Visão Global</span>
                            </h2>
                            <p>Arraste os cards para mover entre as etapas</p>
                        </div>
                        <div class="kanban-actions">
                            <button class="btn-action btn-primary-action" onclick="abrirModalNovoColaborador()">
                                <i class="fas fa-user-plus"></i> Novo Colaborador
                            </button>
                        </div>
                    </div>

                    <div class="kanban-columns" id="kanbanColumns">
                        <!-- Colunas serão inseridas dinamicamente pelo JavaScript -->
                    </div>
                </div>
            </main>
        </div>
    </div>

    <!-- Modal Novo Colaborador -->
    <div class="task-modal-overlay" id="taskModal">
        <div class="task-modal">
            <div class="modal-header">
                <h3>Novo Colaborador no Fluxo</h3>
                <button class="close-modal" onclick="fecharModal()">
                    <i class="fas fa-times"></i>
                </button>
            </div>
            <form id="taskForm" onsubmit="return criarNovoColaborador(event)">
                <div class="modal-body">
                    <div class="form-group">
                        <label for="taskTitle">Nome Completo *</label>
                        <input type="text" id="taskTitle" name="nome" class="form-control" required>
                    </div>
                    
                    <div class="form-row">
                        <div class="form-group">
                            <label for="taskCargo">Cargo *</label>
                            <input type="text" id="taskCargo" name="cargo" class="form-control" required>
                        </div>
                        <div class="form-group">
                            <label for="taskEmail">Email</label>
                            <input type="email" id="taskEmail" name="email" class="form-control">
                        </div>
                    </div>
                    
                    <div class="form-row">
                        <div class="form-group">
                            <label for="taskCPF">CPF</label>
                            <input type="text" id="taskCPF" name="cpf" class="form-control">
                        </div>
                        <div class="form-group">
                            <label for="taskMatricula">Matrícula</label>
                            <input type="text" id="taskMatricula" name="matricula" class="form-control">
                        </div>
                    </div>
                    
                    <div class="form-row">
                        <div class="form-group">
                            <label for="taskDepartment">Etapa Inicial</label>
                            <select id="taskDepartment" name="coluna_inicial_id" class="form-control">
                                <!-- Opções serão preenchidas via JS -->
                            </select>
                        </div>
                        <div class="form-group">
                            <label for="taskPriority">Prioridade</label>
                            <select id="taskPriority" name="prioridade" class="form-control">
                                <option value="medium">Normal</option>
                                <option value="high">Urgente</option>
                            </select>
                        </div>
                    </div>
                    
                    <div class="form-group">
                        <label for="taskObservacoes">Observações</label>
                        <textarea id="taskObservacoes" name="observacoes" class="form-control" rows="3"></textarea>
                    </div>
                </div>
                <div class="modal-footer">
                    <button type="button" class="btn-action btn-secondary-action" onclick="fecharModal()">Cancelar</button>
                    <button type="submit" class="btn-action btn-primary-action">
                        <i class="fas fa-save"></i> Adicionar ao Fluxo
                    </button>
                </div>
            </form>
        </div>
    </div>

    <script src="/static/scripts/api_service.js"></script>
    <script src="/static/scripts/kanban.js"></script>
    <script>
        // Funções auxiliares
        function abrirModalNovoColaborador() {
            document.getElementById('taskModal').style.display = 'flex';
            document.body.style.overflow = 'hidden';
            
            // Preencher select de colunas
            const select = document.getElementById('taskDepartment');
            select.innerHTML = '';
            
            if (window.kanbanBoard && window.kanbanBoard.colunas) {
                window.kanbanBoard.colunas.forEach(coluna => {
                    const option = document.createElement('option');
                    option.value = coluna.id;
                    option.textContent = `${coluna.setor_nome} - ${coluna.nome}`;
                    select.appendChild(option);
                });
            }
        }
        
        function fecharModal() {
            document.getElementById('taskModal').style.display = 'none';
            document.body.style.overflow = '';
            document.getElementById('taskForm').reset();
        }
        
        async function criarNovoColaborador(event) {
            event.preventDefault();
            
            if (!window.kanbanBoard) return false;
            
            const success = await window.kanbanBoard.createNewTask(event.target);
            
            if (success) {
                fecharModal();
            }
            
            return false;
        }
        
        function gerarTokenParaColaborador() {
            // Função auxiliar para gerar token manualmente
            navigator.clipboard?.writeText('token-' + Date.now());
            showNotification('Token copiado!', 'success');
        }
        
        // Atualizar estatísticas
        async function atualizarStats() {
            const stats = await ApiService.getDashboardStats();
            if (!stats) return;
            
            document.getElementById('totalColaboradores').textContent = stats.total_colaboradores || 0;
            document.getElementById('tarefasPendentes').textContent = stats.tarefas_pendentes || 0;
            document.getElementById('progressoGeral').textContent = stats.progresso_geral + '%';
            
            // Atualizar contagem por setor
            const deptList = document.getElementById('departmentList');
            deptList.innerHTML = '<li><a href="#" class="department-filter active" data-department="todos">Todos os Setores <span class="department-count" id="totalCards">' + stats.total_cards + '</span></a></li>';
            
            if (stats.cards_por_setor) {
                stats.cards_por_setor.forEach(setor => {
                    if (setor.total > 0) {
                        const li = document.createElement('li');
                        li.innerHTML = `<a href="#" class="department-filter" data-department="${setor.setor.toLowerCase()}">
                            ${setor.setor} <span class="department-count">${setor.total}</span>
                        </a>`;
                        deptList.appendChild(li);
                    }
                });
            }
        }
        
        // Inicializar
        document.addEventListener('DOMContentLoaded', () => {
            atualizarStats();
            
            // Fechar modal ao clicar fora
            document.getElementById('taskModal').addEventListener('click', (e) => {
                if (e.target === document.getElementById('taskModal')) {
                    fecharModal();
                }
            });
        });
    </script>
</body>
</html>
