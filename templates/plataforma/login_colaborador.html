<!DOCTYPE html>
<html lang="pt-BR">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Meu Onboarding - GUIA</title>
    <link rel="stylesheet" href="/static/styles/main.css">
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.4.0/css/all.min.css">
    <style>
        .login-container { min-height: 100vh; display: flex; align-items: center; justify-content: center; background: linear-gradient(135deg, #007AFF, #34C759); padding: 20px; }
        .login-card { background: white; border-radius: 20px; padding: 40px; width: 100%; max-width: 400px; box-shadow: 0 20px 40px rgba(0,0,0,0.2); }
        .login-header { text-align: center; margin-bottom: 30px; }
        .login-header .logo { font-size: 2.5rem; color: #007AFF; margin-bottom: 10px; }
        .form-group { margin-bottom: 20px; }
        .form-group label { display: block; margin-bottom: 8px; font-weight: 600; color: #333; }
        .form-control { width: 100%; padding: 12px 15px; border: 2px solid #E9ECEF; border-radius: 8px; font-size: 1rem; text-align: center; letter-spacing: 1px; transition: all 0.3s ease; }
        .form-control:focus { outline: none; border-color: #007AFF; box-shadow: 0 0 0 3px rgba(0, 122, 255, 0.1); }
        .btn-login { width: 100%; padding: 14px; background: #007AFF; color: white; border: none; border-radius: 8px; font-size: 1rem; font-weight: 600; cursor: pointer; transition: all 0.3s ease; }
        .btn-login:hover { background: #0056b3; transform: translateY(-2px); box-shadow: 0 5px 15px rgba(0, 122, 255, 0.3); }
        .switch-login { margin-top: 25px; text-align: center; padding-top: 20px; border-top: 1px solid #E9ECEF; }
        .switch-login a { color: #8E8E93; text-decoration: none; font-size: 0.9rem; transition: color 0.3s; }
        .switch-login a:hover { color: #1C1C1E; }
    </style>
</head>
<body>
    <div class="login-container">
        <div class="login-card">
            <div class="login-header">
                <div class="logo"><i class="fas fa-handshake"></i></div>
                <h1>Bem-vindo!</h1>
                <p style="color: #666;">Acesse sua jornada de integração</p>
            </div>
            
            <form onsubmit="return acessarOnboarding(event)">
                <div class="form-group">
                    <label for="accessToken">Token de Acesso</label>
                    <input type="text" id="accessToken" class="form-control" 
                           placeholder="Cole o token fornecido pelo RH" required>
                </div>
                
                <button type="submit" class="btn-login">
                    <i class="fas fa-door-open"></i> Iniciar Integração
                </button>
            </form>
            
            <div class="switch-login">
                <a href="/login"><i class="fas fa-lock"></i> Acesso restrito para Gestores/RH</a>
            </div>
        </div>
    </div>
    
    <script>
        function acessarOnboarding(event) {
            event.preventDefault();
            const token = document.getElementById('accessToken').value.trim();
            if (token) {
                window.location.href = `/plataforma/onboarding?token=${token}`;
            }
            return false;
        }
    </script>
</body>
</html>
