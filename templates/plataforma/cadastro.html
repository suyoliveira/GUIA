<!DOCTYPE html>
<html lang="pt-br">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Cadastro - GUIA</title>
    <link rel="stylesheet" href="{{ url_for('static', filename='styles/main.css') }}">
    <link rel="stylesheet" href="{{ url_for('static', filename='styles/auth.css') }}">
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.4.0/css/all.min.css">
    <link rel="icon" type="image/x-icon" href="{{ url_for('static', filename='assets/favicon.ico') }}">
</head>
<body>
    <header class="main-header">
        <div class="container">
            <div class="header-content">
                <div class="logo">
                    <i class="fas fa-rocket rocket-icon"></i>
                    <span class="logo-text">GUIA</span>
        </div>
    </header>

    <div class="auth-container">
        <div class="auth-box">
            <div class="auth-header">
                <h1>Criar Conta</h1>
                <p>Comece a gerenciar sua equipe agora</p>
            </div>
            
            <form class="auth-form" id="cadastroForm">
                <div class="form-row">
                    <div class="form-group">
                        <label for="nome">
                            <i class="fas fa-user"></i>
                            Nome
                        </label>
                        <input type="text" id="nome" placeholder="Seu nome" required>
                    </div>
                    <div class="form-group">
                        <label for="sobrenome">
                            <i class="fas fa-user"></i>
                            Sobrenome
                        </label>
                        <input type="text" id="sobrenome" placeholder="Seu sobrenome" required>
                    </div>
                </div>

                <div class="form-group">
                    <label for="email">
                        <i class="fas fa-envelope"></i>
                        E-mail
                    </label>
                    <input type="email" id="email" placeholder="Digite seu e-mail" required>
                </div>

                <div class="form-group">
                    <label for="cpf">
                        <i class="fas fa-id-card"></i>
                        CPF
                    </label>
                    <input type="text" id="cpf" placeholder="Digite seu CPF" required>
                </div>

                <div class="form-group">
                    <label for="senha">
                        <i class="fas fa-lock"></i>
                        Senha
                    </label>
                    <input type="password" id="senha" placeholder="Crie uma senha" required>
                </div>

                <div class="form-group terms">
                    <input type="checkbox" id="termos" required>
                    <label for="termos">Li e aceito os <a href="#">termos de uso</a> e <a href="#">política de privacidade</a></label>
                </div>

                <button type="submit" class="btn-auth">
                    <i class="fas fa-user-plus"></i>
                    Criar conta
                </button>
            </form>

            <div class="auth-footer">
                <p>Já tem uma conta? <a href="{{ url_for('login') }}">Fazer login</a></p>
            </div>
        </div>
    </div>

    <script>
        document.getElementById('cadastroForm').addEventListener('submit', function(e) {
            e.preventDefault();
            
            const nome = document.getElementById('nome').value;
            const sobrenome = document.getElementById('sobrenome').value;
            const email = document.getElementById('email').value;
            const cpf = document.getElementById('cpf').value;
            const senha = document.getElementById('senha').value;
            const termos = document.getElementById('termos').checked;
            
            if (!termos) {
                alert('Você precisa aceitar os termos de uso');
                return;
            }
            
            fetch('/api/cadastro', {
                method: 'POST',
                headers: {
                    'Content-Type': 'application/json'
                },
                body: JSON.stringify({ nome, sobrenome, email, cpf, senha })
            })
            .then(response => response.json())
            .then(data => {
                if (data.success) {
                    alert('Cadastro realizado com sucesso!');
                    window.location.href = data.redirect;
                } else {
                    alert('Erro: ' + data.error);
                }
            })
            .catch(error => {
                alert('Erro ao realizar cadastro. Tente novamente.');
            });
        });


        document.getElementById('cpf').addEventListener('input', function(e) {
            let value = e.target.value.replace(/\D/g, '');
            if (value.length > 11) value = value.slice(0, 11);
            
            if (value.length > 9) {
                value = value.replace(/(\d{3})(\d{3})(\d{3})(\d{2})/, '$1.$2.$3-$4');
            } else if (value.length > 6) {
                value = value.replace(/(\d{3})(\d{3})(\d{1,3})/, '$1.$2.$3');
            } else if (value.length > 3) {
                value = value.replace(/(\d{3})(\d{1,3})/, '$1.$2');
            }
            
            e.target.value = value;
        });
    </script>
</body>
</html>
